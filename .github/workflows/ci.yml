name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build · boundary · ArchUnit · unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - run: chmod +x mvnw
      # verify runs: enforcer (validate) + compile + unit tests + ApplicationModules.verify()
      # + ArchUnit. Integration-tagged tests are excluded here (no Docker dependency).
      - name: mvn verify
        run: ./mvnw -B verify

  integration:
    name: Integration (Testcontainers)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - run: chmod +x mvnw
      # Ubuntu runners ship Docker, so the container-backed slice (outbox round-trip, shard
      # routing) runs here. Clearing excluded groups + selecting the 'integration' group.
      - name: mvn verify (integration group)
        run: ./mvnw -B -Dexcluded.test.groups= -Dgroups=integration verify
