# Local single-shard dev dependencies using official images (the app + migrations are run
# separately; this file only provides Postgres + Redis). Bring up with:
#   docker compose -f infra/docker-compose.yml up -d
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: shopify
      POSTGRES_USER: shopify
      POSTGRES_PASSWORD: shopify
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopify -d shopify"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
