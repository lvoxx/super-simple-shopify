# Platform-level error codes -> human messages (default locale).
# Domain modules add their own basenames; these are the cross-cutting ones.
validation.failed=One or more fields are invalid.
internal.error=Something went wrong. Please try again later.
tenancy.unresolved=The request could not be associated with a shop.
tenancy.context.missing=No shop is in scope for this operation.
rate.limited=Too many requests. Please slow down.
store.shop.not_found=No shop was found for the requested id.
